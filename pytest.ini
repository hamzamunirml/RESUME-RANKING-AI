[pytest]
# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Coverage settings
addopts =
    --cov=src
    --cov-report=html
    --cov-report=term
    --cov-report=xml
    --cov-fail-under=80
    -v
    --tb=short

# Markers
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests
    smoke: Smoke tests

# Test filters
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning